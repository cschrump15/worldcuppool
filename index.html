// ─── SCORING ───────────────────────────────────────────────────────────────
const STAGE_POINTS = {
  group:  { winner: 4, bonus: 1 },
  r32:    { winner: 6, bonus: 1 },
  r16:    { winner: 7, bonus: 1 },
  qf:     { winner: 9, bonus: 2 },
  sf:     { winner: 10, bonus: 2 },
  final:  { winner: 12, bonus: 2 },
}

const GROUP_OUTCOMES  = ['home_3plus','home_2','home_1','draw','away_1','away_2','away_3plus']
const KNOCKOUT_OUTCOMES = ['home_3plus','home_2','home_1','home_pks','away_pks','away_1','away_2','away_3plus']

function getOutcomeList(stage) {
  return stage === 'group' ? GROUP_OUTCOMES : KNOCKOUT_OUTCOMES
}

function getSide(outcome) {
  if (outcome === 'draw') return 'draw'
  if (outcome.startsWith('home')) return 'home'
  return 'away'
}

function calcPoints(stage, picked, actual) {
  if (!actual) return null
  const outcomes = getOutcomeList(stage)
  const pickedIdx = outcomes.indexOf(picked)
  const actualIdx = outcomes.indexOf(actual)
  if (pickedIdx === -1 || actualIdx === -1) return 0
  const dist = Math.abs(pickedIdx - actualIdx)
  const { winner, bonus } = STAGE_POINTS[stage] || STAGE_POINTS.group
  const pickedSide = getSide(picked)
  const actualSide = getSide(actual)
  const correctSide = pickedSide === actualSide
  if (dist === 0) return winner + bonus
  if (correctSide) return Math.max(-4, winner - Math.max(0, dist - 1))
  else return Math.max(-4, -(dist - 1))
}

// ─── ESPN SYNC ─────────────────────────────────────────────────────────────

  'Mexico': 'Mexico', 'South Africa': 'South Africa',

  'Uzbekistan': 'Uzbekistan', 'Colombia': 'Colombia',
  'England': 'England', 'Croatia': 'Croatia', 'Ghana': 'Ghana', 'Panama': 'Panama',
}

function normalizeTeamName(name) {
  return ESPN_TEAM_MAP[name] || name
}

function scoreToOutcome(homeScore, awayScore) {
  const diff = homeScore - awayScore
  if (diff === 0) return 'draw'
  if (diff === 1) return 'home_1'
  if (diff === 2) return 'home_2'
  if (diff >= 3) return 'home_3plus'
  if (diff === -1) return 'away_1'
  if (diff === -2) return 'away_2'
  return 'away_3plus'
}

async function fetchESPNForDate(dateStr) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`
  try {
    const res = await fetch(url)
    const data = await res.json()
    return data.events || []
  } catch (e) {
    console.error('ESPN fetch error:', e)
    return []
  }
}

async function syncESPNResults(manualDateStr) {
  // Get all group stage matches needing results
  const pending = state.matches.filter(m =>
    m.stage === 'group' && m.locked && !m.result && m.kickoff_time
  )
  if (pending.length === 0) return 0

  const now = new Date()

  // Filter by 2.5hr window unless manual
  const toSync = manualDateStr
    ? pending
    : pending.filter(m => {
        const syncTime = new Date(new Date(m.kickoff_time).getTime() + 2.5 * 60 * 60 * 1000)
        return now >= syncTime
      })

  if (toSync.length === 0) return 0

  // Group matches by ET date → YYYYMMDD key
  const byDate = {}
  toSync.forEach(m => {
    let dateKey
    if (manualDateStr) {
      dateKey = manualDateStr
    } else {
      const d = new Date(m.kickoff_time)
      const et = new Date(d.toLocaleString('en-US', { timeZone: 'America/New_York' }))
      const y = et.getFullYear()
      const mo = String(et.getMonth() + 1).padStart(2, '0')
      const dy = String(et.getDate()).padStart(2, '0')
      dateKey = `${y}${mo}${dy}`
    }
    if (!byDate[dateKey]) byDate[dateKey] = []
    byDate[dateKey].push(m)
  })

  let updated = 0

  for (const [dateKey, matches] of Object.entries(byDate)) {
    const events = await fetchESPNForDate(dateKey)
    if (!events.length) continue

    for (const m of matches) {
      const homeNorm = normalizeTeamName(m.home_team)
      const awayNorm = normalizeTeamName(m.away_team)

      const event = events.find(e => {
        const comps = e.competitions?.[0]?.competitors || []
        const espnHome = normalizeTeamName(comps.find(c => c.homeAway === 'home')?.team?.displayName || '')
        const espnAway = normalizeTeamName(comps.find(c => c.homeAway === 'away')?.team?.displayName || '')
        return espnHome === homeNorm && espnAway === awayNorm
      })

      if (!event) continue
      const competition = event.competitions?.[0]
      if (!competition) continue

      // Only process finals
      if (competition.status?.type?.name !== 'STATUS_FINAL') continue

      const homeComp = competition.competitors.find(c => c.homeAway === 'home')
      const awayComp = competition.competitors.find(c => c.homeAway === 'away')
      if (!homeComp || !awayComp) continue

      const homeScore = parseInt(homeComp.score)
      const awayScore = parseInt(awayComp.score)
      if (isNaN(homeScore) || isNaN(awayScore)) continue

      const outcome = scoreToOutcome(homeScore, awayScore)

      const { error } = await sb.from('matches').update({ result: outcome, locked: true }).eq('id', m.id)
      if (!error) {
        updated++
        console.log(`✓ ESPN sync: ${m.home_team} vs ${m.away_team} → ${outcome} (${homeScore}-${awayScore})`)
      }
    }
  }

  if (updated > 0) {
    await loadData()
    showToast(`Synced ${updated} result${updated > 1 ? 's' : ''} from ESPN ✓`)
  }
  return updated
}

let state = {

function setState(patch) { Object.assign(state, patch); render() }

function showToast(msg, type = 'success') {
  if (state.toastTimer) clearTimeout(state.toastTimer)
  const timer = setTimeout(() => setState({ toast: null, toastTimer: null }), 3000)
  setState({ toast: { msg, type }, toastTimer: timer })
}

// ─── SUPABASE ──────────────────────────────────────────────────────────────
async function loadData() {
  const [{ data: matches }, { data: picks }, { data: users }] = await Promise.all([
    sb.from('matches').select('*').order('kickoff_time'),
    sb.from('picks').select('*'),
    sb.from('users').select('*'),
  ])
  const userPicks = {}
  if (picks && state.user) {
    picks.filter(p => p.user_id === state.user.id).forEach(p => {
      userPicks[p.match_id] = p.picked_outcome
    })
  }
  const participants = (users || []).map(u => {
    let groupPts = 0, koPts = 0
    ;(matches || []).forEach(m => {
      if (!m.result) return
      const pick = (picks || []).find(p => p.user_id === u.id && p.match_id === m.id)
      const pts = pick ? calcPoints(m.stage, pick.picked_outcome, m.result) : -4
      if (m.stage === 'group') groupPts += pts
      else koPts += pts
    })
    return { ...u, groupPts, koPts, total: groupPts + koPts }
  }).sort((a, b) => b.total - a.total)
  setState({ matches: matches || [], userPicks, participants, allPicks: picks || [] })
}

async function handleLogin(name, pin) {
  setState({ loading: true, loginError: '' })
  const { data, error } = await sb.from('users').select('*').eq('full_name', name).single()
  if (error || !data) { setState({ loading: false, loginError: 'User not found' }); return }
  if (data.pin_hash !== pin) { setState({ loading: false, loginError: 'Incorrect PIN' }); return }
  setState({ user: data, loading: false }); loadData()
}

async function handleRegister(name, phone, pin) {
  setState({ loading: true, loginError: '' })
  const { data, error } = await sb.from('users').insert({ full_name: name, phone, pin_hash: pin }).select().single()
  if (error) { setState({ loading: false, loginError: 'Registration failed. Name or phone may already exist.' }); return }
  setState({ user: data, loading: false }); loadData()
}

async function submitPick(matchId) {
  const picked = state.pendingPicks[matchId]
  if (!picked) return
  const { error } = await sb.from('picks').upsert(
    { user_id: state.user.id, match_id: matchId, picked_outcome: picked },
    { onConflict: 'user_id,match_id' }
  )
  if (!error) {
    const userPicks = { ...state.userPicks, [matchId]: picked }
    const pendingPicks = { ...state.pendingPicks }
    delete pendingPicks[matchId]
    setState({ userPicks, pendingPicks })
    showToast('Pick submitted! ✓')
    loadData()
  }
}

async function toggleLock(matchId, current) {
  await sb.from('matches').update({ locked: !current }).eq('id', matchId)
  showToast(!current ? 'Match locked 🔒' : 'Match unlocked')
  loadData()
}

async function enterResult(matchId, result) {
  await sb.from('matches').update({ result, locked: true }).eq('id', matchId)
  showToast('Result saved ✓')
  loadData()
}

async function togglePayment(userId, current) {
  await sb.from('users').update({ paid: !current }).eq('id', userId)
  showToast(!current ? 'Marked as paid ✓' : 'Marked as unpaid')
  loadData()
}

// ─── AUTO LOCK ─────────────────────────────────────────────────────────────
setInterval(async () => {
  const now = new Date()
  const { data } = await sb.from('matches').select('*').eq('locked', false)
  if (data) {
    for (const m of data) {
      if (m.kickoff_time && new Date(m.kickoff_time) <= now) {
        await sb.from('matches').update({ locked: true }).eq('id', m.id)
      }
    }
    loadData()
  }
}, 60000)

}, 60000)

// ─── OUTCOME LABEL ─────────────────────────────────────────────────────────
function outcomeLabel(outcome, homeTeam, awayTeam) {
  const ha = TEAM_ABBR[homeTeam] || homeTeam
  const aa = TEAM_ABBR[awayTeam] || awayTeam
  const map = {
    home_3plus: ha + ' by 3+', home_2: ha + ' by 2', home_1: ha + ' by 1',
    home_pks: ha + ' in PKs', draw: 'Draw', away_pks: aa + ' in PKs',
    away_1: aa + ' by 1', away_2: aa + ' by 2', away_3plus: aa + ' by 3+',
  }
  return map[outcome] || outcome
}

function render() {
  const app = document.getElementById('app')
  if (!app) return
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return }
  app.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;">'
    + renderTopbar()
    + '<main class="main-content" style="flex:1;">' + renderPage() + '</main>'
    + renderBottomNav()
    + (state.toast ? '<div class="toast' + (state.toast.type === 'error' ? ' toast-error' : '') + '">' + state.toast.msg + '</div>' : '')
    + '</div>'
  bindEvents()
}

function renderTopbar() {
  return '<header class="topbar">'
    + '<div class="topbar-logo"><span class="topbar-year">2026</span><span class="topbar-title">World Cup Pool</span></div>'
    + '<div class="topbar-right"><span class="topbar-user"><strong>' + state.user.full_name + '</strong></span>'

function renderBottomNav() {

    { key: 'standings', label: 'Standings', icon: '🏆' },
    { key: 'distributions', label: 'Distrib.', icon: '📊' },

  ]

    html += '<span class="bnav-label">' + item.label + '</span>'

function renderPage() {

// ─── PICKS PAGE ────────────────────────────────────────────────────────────
function renderPicksPage() {
  const stages = ['group', 'r32', 'r16', 'qf', 'sf', 'final']
  const stageLabels = { group: 'Group Stage', r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarterfinals', sf: 'Semifinals', final: 'Final' }
  const availableStages = [...new Set(state.matches.map(m => m.stage))].sort((a,b) => stages.indexOf(a) - stages.indexOf(b))
  const activeStage = state.activeStage || 'group'
  const stageMatches = state.matches.filter(m => m.stage === activeStage)

  const upcoming = stageMatches.filter(m => !m.locked).sort((a,b) => new Date(a.kickoff_time) - new Date(b.kickoff_time))
  const past = stageMatches.filter(m => m.locked).sort((a,b) => new Date(b.kickoff_time) - new Date(a.kickoff_time))

  let upcomingHtml = ''
  if (activeStage === 'group') {
    const byDate = {}
    upcoming.forEach(m => {
      const dk = new Date(m.kickoff_time).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', timeZone: 'America/New_York' })
      if (!byDate[dk]) byDate[dk] = []
      byDate[dk].push(m)
    })
    for (const [date, matches] of Object.entries(byDate)) {
      upcomingHtml += '<div style="margin-bottom:16px;">'
      upcomingHtml += '<div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c9a84c;margin-bottom:8px;padding:0 2px;">' + date + '</div>'
      for (const m of matches) upcomingHtml += renderMatchCard(m, true)
      upcomingHtml += '</div>'
    }
  } else {
    for (const m of upcoming) upcomingHtml += renderMatchCard(m, true)
  }

  let pastHtml = ''
  if (past.length > 0) {
    pastHtml += '<div style="margin:24px 0 12px;display:flex;align-items:center;gap:10px;">'
    pastHtml += '<div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>'
    pastHtml += '<div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);">Past Matches</div>'
    pastHtml += '<div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>'
    pastHtml += '</div>'
    for (const m of past) pastHtml += renderMatchCard(m, true)
  }

  let tabsHtml = '<div class="stage-tabs">'
  for (const s of availableStages) {
    tabsHtml += '<button class="stage-tab ' + (activeStage === s ? 'active' : '') + '" data-stage="' + s + '">' + stageLabels[s] + '</button>'
  }
  tabsHtml += '</div>'

  const content = (upcomingHtml || '<div style="color:rgba(255,255,255,0.3);font-size:13px;">No upcoming matches.</div>') + pastHtml

  return '<div class="page"><div class="page-title">My Picks</div><div class="page-sub">Picks lock automatically at kickoff.</div>' + tabsHtml + content + '</div>'
}

function renderMatchCard(m, showGroup) {
  const pick = state.pendingPicks[m.id] || state.userPicks[m.id] || null
  const submitted = !!state.userPicks[m.id] && !state.pendingPicks[m.id]
  const isGroup = m.stage === 'group'
  const hc = TEAM_COLORS[m.home_team] || { bg: '#333', border: '#555', text: '#fff' }
  const ac = TEAM_COLORS[m.away_team] || { bg: '#333', border: '#555', text: '#fff' }

  const kickoff = m.kickoff_time ? new Date(m.kickoff_time).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York'
  }) : 'TBD'

  let pts = null
  if (state.userPicks[m.id] && m.result) {
    pts = calcPoints(m.stage, state.userPicks[m.id], m.result)
  }

  function getBtnStyle(outcome) {
    const isSelected = pick === outcome
    const isHome = outcome.startsWith('home')
    const isAway = outcome.startsWith('away')
    const isDraw = outcome === 'draw'
    const tc = isHome ? hc : isAway ? ac : null
    if (isSelected && tc) return 'background:' + tc.bg + ';border-color:' + tc.border + ';color:' + tc.text + ';opacity:1;'
    if (isSelected && isDraw) return 'background:#c9a84c;border-color:#c9a84c;color:#000;'
    if (isHome) return 'background:' + hc.bg + ';border-color:' + hc.border + ';color:' + hc.text + ';opacity:0.45;'
    if (isAway) return 'background:' + ac.bg + ';border-color:' + ac.border + ';color:' + ac.text + ';opacity:0.45;'
    return ''
  }

  function makeBtn(outcome) {
    const label = outcomeLabel(outcome, m.home_team, m.away_team)
    const disabled = m.locked ? 'disabled' : ''
    const extraClass = outcome === 'draw' ? ' draw-btn' : ''
    return '<button class="outcome-btn' + extraClass + (pick === outcome ? ' selected' : '') + '" style="' + getBtnStyle(outcome) + '" data-match="' + m.id + '" data-outcome="' + outcome + '" ' + disabled + '>' + label + '</button>'
  }

  let outcomesHtml = ''
  if (isGroup) {
    outcomesHtml = '<div class="outcomes-group">'
    outcomesHtml += '<div class="outcomes-row">' + makeBtn('home_3plus') + makeBtn('home_2') + makeBtn('home_1') + '</div>'
    outcomesHtml += '<div class="outcomes-draw">' + makeBtn('draw') + '</div>'
    outcomesHtml += '<div class="outcomes-row">' + makeBtn('away_1') + makeBtn('away_2') + makeBtn('away_3plus') + '</div>'
    outcomesHtml += '</div>'
  } else {
    outcomesHtml = '<div class="outcomes-knockout">'
    outcomesHtml += '<div class="outcomes-row-4">' + makeBtn('home_3plus') + makeBtn('home_2') + makeBtn('home_1') + makeBtn('home_pks') + '</div>'
    outcomesHtml += '<div class="outcomes-row-4">' + makeBtn('away_pks') + makeBtn('away_1') + makeBtn('away_2') + makeBtn('away_3plus') + '</div>'
    outcomesHtml += '</div>'
  }

  let html = '<div class="match-card" style="' + (m.locked ? 'opacity:0.85;' : '') + '">'
  html += '<div class="match-meta"><span>' + kickoff + ' ET</span><span>'
  if (m.locked) html += '<span class="locked-badge">LOCKED</span>'
  else if (submitted) html += '<span class="submitted-badge">SUBMITTED</span>'
  html += '</span></div>'
  if (showGroup && m.group_name) {
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#c9a84c;margin-bottom:4px;">Group ' + m.group_name + '</div>'
  }
  html += '<div class="match-title">' + m.home_team + ' vs ' + m.away_team + '</div>'
  html += outcomesHtml
  if (m.result) {
    html += '<div class="result-badge"><span>Result: <strong>' + outcomeLabel(m.result, m.home_team, m.away_team) + '</strong></span>'
    if (pts !== null) html += '<span class="' + (pts >= 0 ? 'pts-pos' : 'pts-neg') + '">' + pts + '</span>'
    html += '</div>'
  } else if (!m.locked) {
    html += '<button class="submit-pick-btn" data-submit="' + m.id + '" ' + (!state.pendingPicks[m.id] ? 'disabled' : '') + '>'
    html += (state.userPicks[m.id] ? 'Update Pick' : 'Submit Pick') + '</button>'
  }
  html += '</div>'
  return html
}

// ─── STANDINGS PAGE ────────────────────────────────────────────────────────
function renderStandingsPage() {
  const sorted = [...state.participants].sort((a,b) => b.total - a.total)

  function getMedal(rank) {
    if (rank === 1) return '🥇'
    if (rank === 2) return '🥈'
    if (rank === 3) return '🥉'
    return String(rank)
  }

  let rows = ''
  sorted.forEach((p, i) => {
    const rank = i + 1
    const medal = getMedal(rank)
    const isMe = p.id === state.user.id
    const scoreColor = p.total >= 0 ? '#4ade80' : '#f87171'
    const grpColor = p.groupPts >= 0 ? '#4ade80' : '#f87171'
    const koColor = p.koPts >= 0 ? '#4ade80' : '#f87171'
    const rankColor = rank===1?'#c9a84c':rank===2?'#94a3b8':rank===3?'#b87333':'rgba(255,255,255,0.2)'
    rows += '<div class="standings-row ' + (isMe ? 'me' : '') + '">'
    rows += '<div class="s-rank" style="color:' + rankColor + ';">' + medal + '</div>'
    rows += '<div><div class="s-name" style="' + (isMe ? 'color:#c9a84c;' : '') + '">' + p.full_name
    if (isMe) rows += ' <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(201,168,76,0.2);color:#c9a84c;font-family:Barlow Condensed,sans-serif;font-weight:700;">YOU</span>'
    rows += '</div></div>'
    rows += '<div class="s-grp" style="color:' + grpColor + ';">' + p.groupPts + '</div>'
    rows += '<div class="s-ko" style="color:' + koColor + ';">' + p.koPts + '</div>'
    rows += '<div class="s-total" style="color:' + scoreColor + ';">' + p.total + '</div>'
    rows += '</div>'
  })

  let html = '<div class="page">'
  html += '<div class="page-title">Standings</div>'
  html += '<div class="page-sub">Group pts + Knockout pts = Total</div>'
  html += '<div class="standings-table">'
  html += '<div class="standings-header"><span style="text-align:left;">#</span><span style="text-align:left;">Name</span><span>Group</span><span>Knockout</span><span>Total</span></div>'
  html += rows || '<div style="padding:16px;color:rgba(255,255,255,0.3);font-size:13px;">No participants yet.</div>'
  html += '</div></div>'
  return html
}

function renderDistCard(m) {
  const matchPicks = state.allPicks.filter(p => p.match_id === m.id)
  const total = state.participants.length
  const outcomes = getOutcomeList(m.stage)
  const isOpen = !!state.openDistMatches[m.id]
  const hc = TEAM_COLORS[m.home_team] || { bg: '#333', border: '#555' }
  const ac = TEAM_COLORS[m.away_team] || { bg: '#333', border: '#555' }

  const counts = {}
  outcomes.forEach(o => counts[o] = 0)
  matchPicks.forEach(p => { if (counts[p.picked_outcome] !== undefined) counts[p.picked_outcome]++ })
  const noPicks = total - matchPicks.length

  let html = '<div class="dist-card">'
  html += '<button class="dist-header" data-toggle-dist-match="' + m.id + '">'
  html += '<div style="flex:1;">'
  html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;color:#e8f0e0;margin-bottom:2px;">' + m.home_team + ' vs ' + m.away_team + '</div>'
  html += '<div style="font-size:11px;color:rgba(255,255,255,0.35);">' + matchPicks.length + '/' + total + ' picks'
  if (m.result) html += ' <span style="color:#4ade80;margin-left:6px;">· ' + outcomeLabel(m.result, m.home_team, m.away_team) + '</span>'
  else html += ' <span style="color:#c9a84c;margin-left:6px;">· In progress</span>'
  html += '</div></div>'
  html += '<span style="color:rgba(255,255,255,0.3);font-size:14px;transform:' + (isOpen ? 'rotate(180deg)' : 'rotate(0deg)') + ';display:inline-block;transition:transform 0.2s;">▾</span>'
  html += '</button>'

  if (isOpen) {
    html += '<div style="padding:0 14px 14px;">'
    html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:0 12px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);">'
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);">Outcome</div>'
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);text-align:right;">Picks</div>'
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);text-align:right;">%</div>'
    html += '</div>'

    for (const o of outcomes) {
      const cnt = counts[o]
      const pct = total > 0 ? Math.round((cnt / total) * 100) : 0
      const isHome = o.startsWith('home')
      const isAway = o.startsWith('away')
      const tc = isHome ? hc : isAway ? ac : null
      const swatchBg = tc ? tc.bg : '#c9a84c'
      const swatchBorder = tc ? tc.border : '#a07830'
      const isResult = m.result === o
      html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:0 12px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);">'
      html += '<div style="display:flex;align-items:center;gap:8px;">'
      html += '<div style="width:11px;height:11px;border-radius:3px;background:' + swatchBg + ';border:2px solid ' + swatchBorder + ';flex-shrink:0;"></div>'
      html += '<span style="font-size:13px;color:' + (isResult ? '#4ade80' : 'rgba(255,255,255,0.65)') + ';">' + outcomeLabel(o, m.home_team, m.away_team) + (isResult ? ' ✓' : '') + '</span>'
      html += '</div>'
      html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:15px;font-weight:700;color:#fff;text-align:right;">' + cnt + '</div>'
      html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;color:' + (isResult ? '#4ade80' : pct > 0 ? '#c9a84c' : 'rgba(255,255,255,0.2)') + ';text-align:right;min-width:36px;">' + pct + '%</div>'
      html += '</div>'
    }

    if (noPicks > 0) {
      const pct = Math.round((noPicks / total) * 100)
      html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:0 12px;align-items:center;padding:7px 0;">'
      html += '<div style="display:flex;align-items:center;gap:8px;">'
      html += '<div style="width:11px;height:11px;border-radius:3px;background:#374151;border:2px solid #6b7280;flex-shrink:0;"></div>'
      html += '<span style="font-size:13px;color:rgba(255,255,255,0.65);">No Pick</span>'
      html += '</div>'
      html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:15px;font-weight:700;color:#fff;text-align:right;">' + noPicks + '</div>'
      html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,0.2);text-align:right;min-width:36px;">' + pct + '%</div>'
      html += '</div>'
    }
    html += '</div>'
  }
  html += '</div>'
  return html
}

// ─── ADMIN PAGE ────────────────────────────────────────────────────────────
function renderPicksStatus() {
  const sortedParticipants = [...state.participants].sort((a,b) => a.full_name.localeCompare(b.full_name))
  const matchesByDate = {}
  state.matches.filter(m => m.stage === 'group').forEach(m => {
    const dateKey = new Date(m.kickoff_time).toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', timeZone: 'America/New_York'
    })
    if (!matchesByDate[dateKey]) matchesByDate[dateKey] = []
    matchesByDate[dateKey].push(m)
  })

  let html = ''
  for (const [date, matches] of Object.entries(matchesByDate)) {
    const madePicks = matches.reduce((sum, m) => {
      return sum + sortedParticipants.filter(u => state.allPicks.find(p => p.user_id === u.id && p.match_id === m.id)).length
    }, 0)
    const totalPicks = matches.length * sortedParticipants.length

    let headerCells = ''
    for (const u of sortedParticipants) {
      headerCells += '<th style="text-align:center;padding:8px 6px;font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;">'
      headerCells += u.full_name.split(' ')[0] + '</th>'
    }

    let tableRows = ''
    for (const m of matches) {
      const ha = TEAM_ABBR[m.home_team] || m.home_team
      const aa = TEAM_ABBR[m.away_team] || m.away_team
      const pickedCount = sortedParticipants.filter(u => state.allPicks.find(p => p.user_id === u.id && p.match_id === m.id)).length
      const pct = sortedParticipants.length > 0 ? (pickedCount / sortedParticipants.length) * 100 : 0
      const barColor = pct === 100 ? '#4ade80' : pct > 0 ? '#c9a84c' : '#f87171'

      let nameCells = ''
      for (const u of sortedParticipants) {
        const hasPick = state.allPicks.find(p => p.user_id === u.id && p.match_id === m.id)
        nameCells += '<td style="text-align:center;padding:9px 6px;">'
        nameCells += '<span style="display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:700;'
        nameCells += 'background:' + (hasPick ? 'rgba(74,222,128,0.12)' : 'rgba(248,113,113,0.1)') + ';'
        nameCells += 'color:' + (hasPick ? '#4ade80' : '#f87171') + ';font-family:Barlow Condensed,sans-serif;">'
        nameCells += (hasPick ? '✓' : '—') + '</span></td>'
      }

      tableRows += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04);">'
      tableRows += '<td style="padding:9px 12px;font-size:12px;font-weight:500;white-space:nowrap;color:#e8f0e0;">'
      tableRows += '<span style="font-family:Barlow Condensed,sans-serif;font-size:9px;color:#c9a84c;display:block;margin-bottom:1px;">GRP ' + m.group_name + '</span>'
      tableRows += ha + ' vs ' + aa + '</td>'
      tableRows += nameCells
      tableRows += '<td style="padding:9px 12px;">'
      tableRows += '<div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;">'
      tableRows += '<div style="width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;">'
      tableRows += '<div style="height:100%;border-radius:2px;width:' + pct + '%;background:' + barColor + ';"></div></div>'
      tableRows += '<span style="font-size:11px;font-weight:700;color:' + barColor + ';font-family:Barlow Condensed,sans-serif;">' + pickedCount + '/' + sortedParticipants.length + '</span>'
      tableRows += '</div></td></tr>'
    }

    html += '<div style="margin-bottom:16px;">'
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c9a84c;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">'
    html += '<span>' + date + '</span>'
    html += '<span style="color:rgba(255,255,255,0.3);font-size:10px;">' + madePicks + '/' + totalPicks + ' picks</span></div>'
    html += '<div style="background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;">'
    html += '<div style="overflow-x:auto;">'
    html += '<table style="width:100%;border-collapse:collapse;min-width:400px;"><thead><tr>'
    html += '<th style="text-align:left;padding:8px 12px;font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25);border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;">Match</th>'
    html += headerCells
    html += '<th style="text-align:right;padding:8px 12px;font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25);border-bottom:1px solid rgba(255,255,255,0.06);">Done</th>'
    html += '</tr></thead><tbody>' + tableRows + '</tbody></table></div></div></div>'
  }

  return html || '<div style="color:rgba(255,255,255,0.3);font-size:13px;padding:16px 0;">No matches yet.</div>'
}

function renderAdminPage() {
  const tabs = ['matches', 'picks', 'results', 'payments']
  const tabLabels = { matches: 'Matches', picks: 'Pick Status', results: 'Results', payments: 'Payments' }
  const activeTab = state.adminTab || 'matches'
  const stages = ['group','r32','r16','qf','sf','final']
  const stageLabels = { group: 'Group Stage', r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarterfinals', sf: 'Semifinals', final: 'Final' }

  let tabContent = ''

  if (activeTab === 'matches') {
    for (const s of stages) {
      const sm = state.matches.filter(m => m.stage === s)
      if (!sm.length) continue
      tabContent += '<div class="admin-section">'
      tabContent += '<div class="admin-section-title">' + stageLabels[s] + '</div>'
      for (const m of sm) {
        tabContent += '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;gap:8px;">'
        tabContent += '<div>'
        tabContent += '<div style="font-size:12px;color:#e8f0e0;">' + m.home_team + ' vs ' + m.away_team + '</div>'
        tabContent += '<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;">'
        if (m.kickoff_time) tabContent += new Date(m.kickoff_time).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZone:'America/New_York' })
        if (m.result) tabContent += ' <span style="color:#4ade80;margin-left:6px;">✓ ' + outcomeLabel(m.result, m.home_team, m.away_team) + '</span>'
        tabContent += '</div></div>'
        tabContent += '<button class="lock-toggle ' + (m.locked ? 'locked-btn' : 'unlocked') + '" data-lock="' + m.id + '" data-locked="' + m.locked + '">'
        tabContent += (m.locked ? 'Unlock' : 'Lock') + '</button>'
        tabContent += '</div>'
      }
      tabContent += '</div>'
    }
  }

  if (activeTab === 'picks') {
    tabContent = renderPicksStatus()
  }

  if (activeTab === 'results') {
    // ESPN Auto-sync section
    tabContent += '<div class="admin-section">'
    tabContent += '<div class="admin-section-title">ESPN Score Sync</div>'
    tabContent += '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:12px;line-height:1.6;">Auto-sync runs every 60 seconds for group stage matches 2.5hrs after kickoff. Use manual sync to backfill a specific date.</div>'
    tabContent += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">'
    tabContent += '<input type="date" id="sync-date-input" value="' + state.syncDate + '" style="flex:1;padding:8px 10px;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-family:Barlow,sans-serif;font-size:13px;min-width:140px;" />'
    tabContent += '<button id="manual-sync-btn" style="padding:8px 16px;border-radius:6px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);color:#c9a84c;font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Sync Scores</button>'
    tabContent += '</div>'
    if (state.syncStatus) {
      tabContent += '<div style="font-size:12px;color:#4ade80;margin-top:4px;">' + state.syncStatus + '</div>'
    }
    tabContent += '</div>'

    // Manual result entry for non-group stages
    const lockedNoResult = state.matches.filter(m => m.locked && !m.result && m.stage !== 'group')
    if (lockedNoResult.length > 0) {
      tabContent += '<div class="admin-section">'
      tabContent += '<div class="admin-section-title">Manual Results (Knockout)</div>'
      for (const m of lockedNoResult) {
        const outcomes = getOutcomeList(m.stage)
        const ri = state.resultInputs[m.id] || ''
        tabContent += '<div style="margin-bottom:12px;">'
        tabContent += '<div style="font-size:13px;font-weight:600;color:#e8f0e0;margin-bottom:8px;">' + m.home_team + ' vs ' + m.away_team + '</div>'
        tabContent += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'
        tabContent += '<select style="flex:1;padding:6px 8px;border-radius:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:12px;font-family:Barlow,sans-serif;" data-result-select="' + m.id + '">'
        tabContent += '<option value="">Select result...</option>'
        for (const o of outcomes) {
          tabContent += '<option value="' + o + '" ' + (ri === o ? 'selected' : '') + '>' + outcomeLabel(o, m.home_team, m.away_team) + '</option>'
        }
        tabContent += '</select>'
        tabContent += '<button class="save-btn" data-save-result="' + m.id + '">Save</button>'
        tabContent += '</div></div>'
      }
      tabContent += '</div>'
    }

    // Also allow manual entry for any group stage match (override)
    tabContent += '<div class="admin-section">'
    tabContent += '<div class="admin-section-title">Manual Override (Group Stage)</div>'
    tabContent += '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:12px;">Override auto-sync or enter a result manually for any locked group match.</div>'
    const lockedGroupNoResult = state.matches.filter(m => m.locked && !m.result && m.stage === 'group')
    if (lockedGroupNoResult.length === 0) {
      tabContent += '<div style="color:rgba(255,255,255,0.3);font-size:13px;">No pending group stage results.</div>'
    } else {
      for (const m of lockedGroupNoResult) {
        const outcomes = getOutcomeList(m.stage)
        const ri = state.resultInputs[m.id] || ''
        tabContent += '<div style="margin-bottom:12px;">'
        tabContent += '<div style="font-size:12px;color:#e8f0e0;margin-bottom:6px;">'
        tabContent += '<span style="font-family:Barlow Condensed,sans-serif;font-size:9px;color:#c9a84c;margin-right:6px;">GRP ' + m.group_name + '</span>'
        tabContent += m.home_team + ' vs ' + m.away_team
        tabContent += '</div>'
        tabContent += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'
        tabContent += '<select style="flex:1;padding:6px 8px;border-radius:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:12px;font-family:Barlow,sans-serif;" data-result-select="' + m.id + '">'
        tabContent += '<option value="">Select result...</option>'
        for (const o of outcomes) {
          tabContent += '<option value="' + o + '" ' + (ri === o ? 'selected' : '') + '>' + outcomeLabel(o, m.home_team, m.away_team) + '</option>'
        }
        tabContent += '</select>'
        tabContent += '<button class="save-btn" data-save-result="' + m.id + '">Save</button>'
        tabContent += '</div></div>'
      }
    }
    tabContent += '</div>'
  }

  if (activeTab === 'payments') {
    const paidCount = state.participants.filter(p => p.paid).length
    tabContent += '<div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:12px;">'
    tabContent += '<span style="color:#4ade80;font-weight:700;">' + paidCount + '</span> of <span style="color:#fff;font-weight:700;">' + state.participants.length + '</span> paid'
    tabContent += '</div>'
    tabContent += '<div style="background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;">'
    const sorted = [...state.participants].sort((a,b) => a.full_name.localeCompare(b.full_name))
    sorted.forEach((u, i) => {
      tabContent += '<div style="display:flex;align-items:center;padding:12px 16px;border-bottom:' + (i < sorted.length-1 ? '1px solid rgba(255,255,255,0.04)' : 'none') + ';">'
      tabContent += '<div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#e8f0e0;">' + u.full_name + '</div>'
      tabContent += '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px;">' + (u.phone || 'No phone') + '</div></div>'
      tabContent += '<button data-payment="' + u.id + '" data-paid="' + u.paid + '" style="padding:6px 16px;border-radius:6px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;border:none;cursor:pointer;background:' + (u.paid ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)') + ';color:' + (u.paid ? '#4ade80' : '#f87171') + ';">'
      tabContent += (u.paid ? '✓ Paid' : 'Unpaid') + '</button></div>'
    })
    tabContent += '</div>'
  }

  let html = '<div class="page">'
  html += '<div class="page-title">Admin</div>'
  html += '<div class="page-sub">Manage matches, results, and payments.</div>'
  html += '<div class="stage-tabs" style="margin-bottom:16px;">'
  for (const t of tabs) {
    html += '<button class="stage-tab ' + (activeTab === t ? 'active' : '') + '" data-admin-tab="' + t + '">' + tabLabels[t] + '</button>'
  }
  html += '</div>' + tabContent + '</div>'
  return html
}

// ─── EVENT BINDING ─────────────────────────────────────────────────────────
function bindLogin() {
  document.getElementById('login-tab')?.addEventListener('click', () => setState({ isRegister: false, loginError: '' }))
  document.getElementById('register-tab')?.addEventListener('click', () => setState({ isRegister: true, loginError: '' }))
  document.getElementById('login-name')?.addEventListener('input', e => { state.loginName = e.target.value })
  document.getElementById('login-phone')?.addEventListener('input', e => { state.loginPhone = e.target.value })
  for (let i = 0; i < 4; i++) {
    const input = document.getElementById('pin-' + i)
    if (!input) continue
    input.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g, '').slice(-1)
      e.target.value = val
      state.loginPin[i] = val
      if (val && i < 3) document.getElementById('pin-' + (i+1))?.focus()
    })
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !state.loginPin[i] && i > 0) document.getElementById('pin-' + (i-1))?.focus()
    })
  }
  document.getElementById('login-submit')?.addEventListener('click', () => {
    const name = state.loginName.trim()
    const pin = state.loginPin.join('')
    if (!name) { setState({ loginError: 'Please enter your name' }); return }
    if (pin.length < 4) { setState({ loginError: 'Please enter your 4-digit PIN' }); return }
    if (state.isRegister) handleRegister(name, state.loginPhone.trim(), pin)
    else handleLogin(name, pin)
  })
}

function bindEvents() {
  document.getElementById('signout-btn')?.addEventListener('click', () => {
    setState({ user: null, page: 'picks', matches: [], userPicks: {}, pendingPicks: {},
      participants: [], allPicks: [], loginPin: ['','','',''], loginName: '', loginPhone: '', loginError: '' })
  })
  document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => setState({ page: btn.dataset.page }))
  })
  document.querySelectorAll('[data-stage]').forEach(btn => {
    btn.addEventListener('click', () => setState({ activeStage: btn.dataset.stage }))
  })
  document.querySelectorAll('[data-dist-stage]').forEach(btn => {
    btn.addEventListener('click', () => setState({ activeDistStage: btn.dataset.distStage }))
  })
  document.querySelectorAll('[data-outcome]').forEach(btn => {
    btn.addEventListener('click', () => {
      const matchId = btn.dataset.match
      const outcome = btn.dataset.outcome
      setState({ pendingPicks: { ...state.pendingPicks, [matchId]: outcome } })
    })
  })
  document.querySelectorAll('[data-submit]').forEach(btn => {
    btn.addEventListener('click', () => submitPick(btn.dataset.submit))
  })
  document.querySelectorAll('[data-admin-tab]').forEach(btn => {
    btn.addEventListener('click', () => setState({ adminTab: btn.dataset.adminTab }))
  })
  document.querySelectorAll('[data-lock]').forEach(btn => {
    btn.addEventListener('click', () => toggleLock(btn.dataset.lock, btn.dataset.locked === 'true'))
  })
  document.querySelectorAll('[data-result-select]').forEach(sel => {
    sel.addEventListener('change', e => { state.resultInputs[sel.dataset.resultSelect] = e.target.value })
  })
  document.querySelectorAll('[data-save-result]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.saveResult
      const result = state.resultInputs[id]
      if (result) enterResult(id, result)
      else showToast('Please select a result', 'error')
    })
  })
  document.querySelectorAll('[data-payment]').forEach(btn => {
    btn.addEventListener('click', () => togglePayment(btn.dataset.payment, btn.dataset.paid === 'true'))
  })
  document.querySelectorAll('[data-toggle-dist-match]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.toggleDistMatch
      setState({ openDistMatches: { ...state.openDistMatches, [id]: !state.openDistMatches[id] } })
    })
  })

  // Sync date input
  document.getElementById('sync-date-input')?.addEventListener('change', e => {
    state.syncDate = e.target.value
  })

  // Manual sync button
  document.getElementById('manual-sync-btn')?.addEventListener('click', async () => {
    if (!state.syncDate) { showToast('Please select a date first', 'error'); return }
    // Convert YYYY-MM-DD to YYYYMMDD
    const dateStr = state.syncDate.replace(/-/g, '')
    setState({ syncStatus: 'Syncing...' })
    const count = await syncESPNResults(dateStr)
    setState({ syncStatus: count > 0 ? 'Synced ' + count + ' result' + (count > 1 ? 's' : '') + ' ✓' : 'No new results found for that date.' })
  })
}

render()
</script>
